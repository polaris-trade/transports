[workspace]
resolver = "3"
members = ["crates/*"]

[workspace.package]
edition = "2024"
rust-version = "1.96.0"
authors = ["0x67 <69191110+0x67@users.noreply.github.com>"]
repository = "https://github.com/polaris-trade/transport-core"
homepage = "https://github.com/polaris-trade"
license = "MIT OR Apache-2.0"

[workspace.dependencies]
# Internal deps — add path-based entries as new members land under crates/*:
transport_core = { path = "crates/transport_core" }

# External deps — minimal, opinionated defaults. Add or remove freely.
anyhow = "1.0.103"
thiserror = "2.0.18"
mockall = "0.15"
rstest = "0.26.1"
tokio = { version = "1.52.3", features = ["macros", "rt-multi-thread"] }
fastrand = "2.1.2"
tracing = "0.1.44"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.150"
