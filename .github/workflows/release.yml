name: release

on:
  push:
    branches: [main]

jobs:
  release:
    uses: polaris-trade/ci/.github/workflows/release.yml@main
    with:
      publish: true
    secrets:
      release-plz-token:              ${{ secrets.RELEASE_PLZ_TOKEN }}
      cargo-registries-polaris-token: ${{ secrets.CARGO_REGISTRIES_POLARIS_TOKEN }}
